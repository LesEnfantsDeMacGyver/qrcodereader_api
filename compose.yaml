services:
  qrcodereader-api:
    build:
      context: .
      target: runtime
    image: qrcodereader-api:latest
    ports:
      - "${PORT:-8000}:8000"
    environment:
      WECHAT_MODEL_DIR: /app/models
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
      URL_FETCH_TIMEOUT_SECONDS: ${URL_FETCH_TIMEOUT_SECONDS:-10}
      ALLOW_PRIVATE_URLS: ${ALLOW_PRIVATE_URLS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
